<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Proyecto Full-Stack</title>
  </head>
  <body>
    <h1 id="enc-1">Proyecto Full-Stack</h1>
    <p id="parrafo">Esto es un párrafo</p>
    <ul id="list-des">
      <h2 id="comp-list-des-enc">Lista desordenada. Celulares:</h2>
      <li id="comp-list-des">Samsung Galaxy S26 Ultra</li>
      <li id="comp-list-des">I Phone 17 Pro Max</li>
    </ul>
    <ol id="list-ord">
      <h2 id="comp-list-ord-enc">Lista ordenada. Días de la semana:</h2>
      <li id="comp-list-ord">Lunes</li>
      <li id="comp-list-ord">Martes</li>
      <li id="comp-list-ord">Miércoles</li>
      <li id="comp-list-ord">Jueves</li>
      <li id="comp-list-ord">Viernes</li>
      <li id="comp-list-ord">Sábado</li>
      <li id="comp-list-ord">Domingo</li>
    </ol>
    <form id="formulario" action="">
      <h2 id="enc-form">Formulario</h2>
      <label for="nombre">Nombre:</label>
      <input type="text" name="nombre" id="nombre" /><br />
      <label for="emaail">Email:</label>
      <input type="email" name="email" id="emaail" /><br />
      <label for="selecciona">Selecciona tu lenguaje favorito:</label>
      <select name="selecciona" id="selecciona">
        <option value="">HTML</option>
        <option value="">CSS</option>
        <option value="">JAVASCRIPT</option>
      </select>
      <br />
      <label for="comentarios">Déjanos saber tu opinión:</label>
      <textarea name="comentarios" id="comentarios"></textarea><br />
      <input type="reset" value="Refrescar Formulario" />
      <input type="submit" name="enviar" value="Enviar" />
    </form>
  </body>
</html>
